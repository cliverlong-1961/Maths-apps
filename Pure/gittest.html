<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Update Test</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #message {
            font-size: 3rem;
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>

    <div id="message">GitHub update test</div>

    <script>
        const colours = ["red", "blue", "green"];
        let index = 0;

        setInterval(() => {
            index = (index + 1) % colours.length;
            document.getElementById("message").style.color = colours[index];
        }, 2000);
    </script>

</body>
</html>
