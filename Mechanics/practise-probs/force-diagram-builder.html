<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Force Diagram Builder — A-Level Mechanics</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #e8ecf0;
  color: #2c3e50;
  min-height: 100vh;
  user-select: none;
}

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
  color: white;
  padding: 16px 28px;
  text-align: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.25);
  position: relative;
}
header h1 {
  font-size: 1.5rem;
  letter-spacing: 0.3px;
  margin-bottom: 3px;
}
header p {
  font-size: 0.83rem;
  opacity: 0.8;
  font-style: italic;
}

/* ── SCENARIO BAR ── */
.scenario-bar {
  background: #2471a3;
  padding: 9px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  color: white;
  font-size: 0.88rem;
  flex-wrap: wrap;
  border-bottom: 2px solid #1a5c8a;
}
.scenario-bar label { font-weight: bold; white-space: nowrap; }
.scenario-bar select {
  font-family: Georgia, serif;
  font-size: 0.88rem;
  padding: 5px 12px;
  border: none;
  border-radius: 4px;
  background: white;
  color: #1a3a5c;
  cursor: pointer;
  min-width: 280px;
  font-weight: bold;
}

/* ── LAYOUT ── */
.main-layout {
  display: flex;
  max-width: 1080px;
  margin: 20px auto;
  padding: 0 16px;
  gap: 18px;
  align-items: flex-start;
}

/* ── PALETTE ── */
.palette-panel {
  width: 162px;
  flex-shrink: 0;
  background: white;
  border-radius: 10px;
  border: 1px solid #cdd5df;
  padding: 14px 11px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.09);
}
.palette-panel h2 {
  font-size: 0.92rem;
  color: #1a3a5c;
  border-bottom: 2px solid #1a3a5c;
  padding-bottom: 6px;
  margin-bottom: 6px;
}
.palette-hint {
  font-size: 0.72rem;
  color: #8a95a0;
  line-height: 1.4;
  margin-bottom: 11px;
}

.force-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 9px;
  margin-bottom: 7px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: grab;
  background: #f6f8fa;
  transition: box-shadow 0.15s, transform 0.12s, opacity 0.2s;
  font-size: 0.8rem;
  line-height: 1.2;
  -webkit-user-drag: none;
}
.force-chip:last-child { margin-bottom: 0; }
.force-chip:hover:not(.used) {
  box-shadow: 0 3px 10px rgba(0,0,0,0.16);
  transform: translateY(-1px);
}
.force-chip.used { opacity: 0.32; pointer-events: none; }
.chip-name { font-weight: bold; }

.remove-note {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid #eee;
  font-size: 0.7rem;
  color: #aaa;
  text-align: center;
  line-height: 1.5;
}

/* ── DIAGRAM PANEL ── */
.diagram-panel {
  flex: 1;
  min-width: 0;
  background: white;
  border-radius: 10px;
  border: 1px solid #cdd5df;
  padding: 20px 22px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.09);
}

.scenario-desc {
  background: #eaf4fb;
  border-left: 4px solid #2471a3;
  padding: 10px 14px;
  margin-bottom: 16px;
  border-radius: 0 6px 6px 0;
  font-size: 0.87rem;
  line-height: 1.6;
}
.scenario-desc .stitle {
  font-weight: bold;
  font-size: 0.95rem;
  color: #1a3a5c;
  display: block;
  margin-bottom: 3px;
}

.svg-wrapper {
  width: 100%;
  max-width: 520px;
  margin: 0 auto;
  border: 1px solid #dde3ea;
  border-radius: 8px;
  overflow: hidden;
  background: #fafbfc;
}
#diagram-svg { width: 100%; height: auto; display: block; }

/* SVG interactivity */
.placed-g { cursor: pointer; }
.placed-g .hit-area { stroke: transparent; stroke-width: 16; fill: none; }
.placed-g:hover .arrow-line { stroke-width: 3.5 !important; }

.controls {
  display: flex;
  gap: 9px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.btn {
  font-family: Georgia, serif;
  font-size: 0.87rem;
  padding: 8px 18px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 0.2px;
  transition: filter 0.15s, transform 0.1s;
}
.btn:hover  { filter: brightness(1.1); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-check  { background: #27ae60; color: white; }
.btn-reset  { background: #e67e22; color: white; }
.btn-hint   { background: #2980b9; color: white; }

/* ── FEEDBACK ── */
#feedback {
  margin-top: 14px;
  padding: 12px 15px;
  border-radius: 7px;
  font-size: 0.85rem;
  line-height: 1.95;
  display: none;
}
#feedback.success { background: #eafaf1; border: 1px solid #27ae60; display: block; }
#feedback.error   { background: #fdedec; border: 1px solid #e74c3c; display: block; }
#feedback.info    { background: #eaf4fb; border: 1px solid #2980b9; display: block; }
.fb-ok   { color: #1e8449; }
.fb-bad  { color: #c0392b; }
.fb-miss { color: #7d6608; }
.fb-expl { color: #1a4a2a; font-style: italic; margin-top: 6px; padding-top: 8px; border-top: 1px solid #a9dfbf; display: block; }

/* ── DIRECTION PICKER ── */
#picker {
  position: fixed;
  background: white;
  border: 2px solid #2471a3;
  border-radius: 10px;
  padding: 14px 15px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.22);
  z-index: 1000;
  min-width: 215px;
  max-width: 275px;
  display: none;
  animation: pickerIn 0.15s ease;
}
@keyframes pickerIn {
  from { opacity: 0; transform: scale(0.92) translateY(-6px); }
  to   { opacity: 1; transform: scale(1)    translateY(0);    }
}
#picker.open { display: block; }
.picker-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
}
#picker-force-name {
  font-weight: bold;
  font-size: 0.95rem;
}
#picker-close {
  background: none;
  border: none;
  font-size: 1.15rem;
  cursor: pointer;
  color: #bbb;
  line-height: 1;
  padding: 0 3px;
  transition: color 0.1s;
}
#picker-close:hover { color: #e74c3c; }
.picker-sub {
  font-size: 0.76rem;
  color: #999;
  margin-bottom: 9px;
}
.dir-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 7px 11px;
  margin: 4px 0;
  font-family: Georgia, serif;
  font-size: 0.82rem;
  background: #f2f6fb;
  border: 1px solid #c8d6e5;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
  color: #2c3e50;
}
.dir-btn:hover { background: #d4e9f7; border-color: #2471a3; }

/* ── DRAG GHOST ── */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-family: Georgia, serif;
  font-weight: bold;
  color: white;
  box-shadow: 0 5px 18px rgba(0,0,0,0.32);
  transform: translate(-50%, -50%);
  white-space: nowrap;
  display: none;
  transition: none;
}
#ghost.active { display: block; }

/* ── DIAGRAM NOTE ── */
#diagram-note {
  display: none;
  color: #c0392b;
  font-size: 0.78rem;
  font-style: italic;
  line-height: 1.5;
  margin-bottom: 10px;
  padding: 7px 12px;
  border-left: 3px solid #c0392b;
  background: #fdf2f2;
  border-radius: 0 5px 5px 0;
}
@media (max-width: 680px) {
  .main-layout { flex-direction: column; padding: 0 10px; }
  .palette-panel { width: 100%; }
  #palette-forces { display: flex; flex-wrap: wrap; gap: 6px; }
  .force-chip { margin-bottom: 0; flex: 1 0 calc(50% - 6px); }
}
</style>
</head>
<body>

<header>
  <h1>Force Diagram Builder</h1>
  <p>Drag forces onto the object · choose a direction · check your diagram</p>
</header>

<div class="scenario-bar">
  <label for="sel">Scenario:</label>
  <select id="sel">
    <option value="inclined">1 — Block on a Rough Inclined Plane</option>
    <option value="lift">2 — Block in an Accelerating Lift</option>
    <option value="sliding">3 — Block Sliding on a Rough Horizontal Surface</option>
    <option value="resolved">4a — Resolving a Pulling Force (α above horizontal)</option>
    <option value="resolved_below">4b — Resolving a Pushing/Pulling Force (α below horizontal)</option>
    <option value="connected">5 — Two Masses on a String (Ceiling + Hanging Mass)</option>
  </select>
</div>

<div class="main-layout">

  <aside class="palette-panel">
    <h2>Force Palette</h2>
    <p class="palette-hint">Drag a force arrow onto the shaded object in the diagram</p>
    <div id="palette-forces"></div>
    <p class="remove-note">Click a placed arrow to remove it</p>
  </aside>

  <main class="diagram-panel">
    <div class="scenario-desc" id="desc"></div>
    <div id="diagram-note"></div>
    <div class="svg-wrapper">
      <svg id="diagram-svg" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Single arrowhead: fill inherits stroke colour via context-stroke -->
          <marker id="ah" markerWidth="7" markerHeight="5"
                  refX="6.5" refY="2.5" orient="auto">
            <polygon points="0 0, 7 2.5, 0 5" fill="context-stroke"/>
          </marker>
          <!-- For static diagram arrows (red accel indicator etc.) -->
          <marker id="ah-red" markerWidth="7" markerHeight="5"
                  refX="6.5" refY="2.5" orient="auto">
            <polygon points="0 0, 7 2.5, 0 5" fill="#e74c3c"/>
          </marker>
          <pattern id="hatch" width="7" height="7"
                   patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="7" stroke="#aaa" stroke-width="1.2"/>
          </pattern>
        </defs>
        <g id="static-layer"></g>
        <g id="arrows-layer"></g>
      </svg>
    </div>

    <div class="controls">
      <button class="btn btn-check" id="btn-check">✓ Check Diagram</button>
      <button class="btn btn-reset" id="btn-reset">↺ Reset</button>
      <button class="btn btn-hint"  id="btn-hint">💡 Hint</button>
    </div>
    <div id="feedback"></div>
  </main>

</div>

<!-- Floating direction picker -->
<div id="picker">
  <div class="picker-head">
    <span id="picker-force-name"></span>
    <button id="picker-close">✕</button>
  </div>
  <p class="picker-sub" id="picker-sub">Choose the direction of this force:</p>
  <div id="picker-dirs"></div>
</div>

<!-- Drag ghost label -->
<div id="ghost"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
//  FORCE COLOURS
// ══════════════════════════════════════════════════════════
const COLORS = {
  'Weight':           '#c0392b',
  'Normal Reaction':  '#27ae60',
  'Friction':         '#e67e22',
  'Tension':          '#8e44ad',
  'Applied Force':    '#2980b9',
  'Air Resistance':   '#7f8c8d',
  'Thrust':           '#16a085',
  'F cos α':          '#1abc9c',
  'F sin α':          '#9b59b6',
  'T₁':               '#d35400',
  'T₂':               '#2980b9',
};
const ALL_FORCES = ['Weight','Normal Reaction','Friction','Tension','Applied Force','Air Resistance','Thrust'];

// SVG viewport
const VW = 500, VH = 400;
// Arrow length in SVG user units
const AL = 84;

// ══════════════════════════════════════════════════════════
//  SCENARIO DEFINITIONS
// ══════════════════════════════════════════════════════════
/*
  Angle convention (SVG coords, y increases downward):
    0°   = right
    90°  = down
    180° = left
    270° = up

  Inclined plane at 30° (slope rises to the right):
    Up the slope   = cos 330° = +0.866, sin 330° = –0.5  → right & up  ✓
    Down the slope = cos 150° = –0.866, sin 150° = +0.5  → left & down ✓
    Normal (away)  = cos 240° = –0.5,   sin 240° = –0.866 → left & up  ✓
*/
const SCENARIOS = {

  inclined: {
    title: 'Block on a Rough Inclined Plane',
    desc:  'A block rests <strong>stationary</strong> on a rough plane inclined at 30° to the horizontal. Draw <em>all</em> the forces acting on the block.',
    hint:  'There are exactly <strong>3 forces</strong> acting on the block. One acts vertically, one is perpendicular to the slope surface, and one acts along the slope.',
    oc:    { x: 250, y: 206 },   // object centre — bottom edge sits on slope
    dz:    54,                    // drop-zone radius (px in SVG units)
    dirs: [
      { label: 'Vertically downward',                        a:  90 },
      { label: 'Vertically upward',                          a: 270 },
      { label: 'Up the slope',                               a: 330 },
      { label: 'Down the slope',                             a: 150 },
      { label: 'Perpendicular to slope (away from surface)', a: 240 },
      { label: 'Perpendicular to slope (into surface)',      a:  60 },
    ],
    answer: [
      { force: 'Weight',          dir: 'Vertically downward'                        },
      { force: 'Normal Reaction', dir: 'Perpendicular to slope (away from surface)' },
      { force: 'Friction',        dir: 'Up the slope'                               },
    ],
    expl: '<strong>Weight</strong> acts vertically downward through the centre of mass. <strong>Normal Reaction</strong> acts perpendicular to the slope surface, directed away from it. Since the block is stationary on a rough slope, <strong>Friction</strong> acts <em>up</em> the slope, preventing it from sliding down.',
    drawSVG: drawInclinedPlane,
  },

  lift: {
    title: 'Block in an Accelerating Lift',
    desc:  'A block of mass <em>m</em> rests on the floor of a lift that is <strong>accelerating upward</strong>. Draw all the forces acting on the block.',
    hint:  'There are exactly <strong>2 forces</strong> acting on the block — one gravitational force from the Earth and one contact force from the lift floor.',
    oc:    { x: 250, y: 260 },
    dz:    58,
    dirs: [
      { label: 'Vertically downward', a:  90 },
      { label: 'Vertically upward',   a: 270 },
      { label: 'Horizontally right',  a:   0 },
      { label: 'Horizontally left',   a: 180 },
    ],
    answer: [
      { force: 'Weight',          dir: 'Vertically downward' },
      { force: 'Normal Reaction', dir: 'Vertically upward'   },
    ],
    expl: '<strong>Weight</strong> (= <em>mg</em>) acts vertically downward. The lift floor exerts a <strong>Normal Reaction</strong> vertically upward. Since the lift accelerates upward, by Newton\'s second law N − mg = ma, so N &gt; mg. There are no horizontal forces on the block.',
    drawSVG: drawLift,
  },

  sliding: {
    title: 'Block Sliding on a Rough Horizontal Surface',
    desc:  'A block slides to the <strong>right</strong> along a rough horizontal surface with no driving force. Draw all the forces acting on the block.',
    hint:  'There are exactly <strong>3 forces</strong> acting on the block. Remember that kinetic friction always opposes the direction of motion.',
    oc:    { x: 250, y: 250 },
    dz:    62,
    dirs: [
      { label: 'Vertically downward', a:  90 },
      { label: 'Vertically upward',   a: 270 },
      { label: 'Horizontally right',  a:   0 },
      { label: 'Horizontally left',   a: 180 },
    ],
    answer: [
      { force: 'Weight',          dir: 'Vertically downward' },
      { force: 'Normal Reaction', dir: 'Vertically upward'   },
      { force: 'Friction',        dir: 'Horizontally left'   },
    ],
    expl: '<strong>Weight</strong> acts vertically downward. <strong>Normal Reaction</strong> from the surface acts vertically upward. <strong>Friction</strong> (kinetic) acts horizontally to the <em>left</em>, opposing the rightward motion. With no driving force, the block decelerates.',
    drawSVG: drawSlidingBlock,
  },

  resolved: {
    title: 'Resolving a Pulling Force at Angle α',
    desc:  'A block rests on a rough horizontal surface. An external force <strong>F</strong> is applied at angle <em>α</em> above the horizontal, pulling the block to the right. Resolve <strong>F</strong> into its components <strong>parallel</strong> and <strong>perpendicular</strong> to the surface by dragging the correct arrows onto the block.',
    hint:  'The component <strong>parallel</strong> to the surface (horizontal) equals F&nbsp;cos&nbsp;α — choose the direction the block is being pulled. The component <strong>perpendicular</strong> to the surface (vertical) equals F&nbsp;sin&nbsp;α — since α is above the horizontal, which way does this component act relative to the surface?',
    oc:    { x: 250, y: 250 },
    dz:    62,
    palette: ['F cos α', 'F sin α'],
    dirs: [
      { label: 'Parallel to surface — to the right',               a:   0 },
      { label: 'Parallel to surface — to the left',                a: 180 },
      { label: 'Perpendicular to surface — upward (away from surface)',   a: 270 },
      { label: 'Perpendicular to surface — downward (into surface)',      a:  90 },
    ],
    answer: [
      { force: 'F cos α', dir: 'Parallel to surface — to the right'               },
      { force: 'F sin α', dir: 'Perpendicular to surface — upward (away from surface)' },
    ],
    expl: 'Since <strong>F</strong> acts at angle α <em>above</em> the horizontal: the component <strong>parallel</strong> to the surface is <strong>F&thinsp;cos&thinsp;α</strong>, acting to the right (in the direction of the applied force\'s horizontal projection). The component <strong>perpendicular</strong> to the surface is <strong>F&thinsp;sin&thinsp;α</strong>, acting <em>upward</em>, away from the surface — this reduces the normal reaction: N = mg − F sin α.',
    drawSVG: drawResolvedForce,
  },

  resolved_below: {
    title: 'Resolving a Force at Angle α Below the Horizontal',
    desc:  'A block rests on a rough horizontal surface. An external force <strong>F</strong> is applied at angle <em>α</em> <strong>below</strong> the horizontal, pushing the block to the right and into the surface. Resolve <strong>F</strong> into its components <strong>parallel</strong> and <strong>perpendicular</strong> to the surface by dragging the correct arrows onto the block.',
    hint:  'The component <strong>parallel</strong> to the surface is F&nbsp;cos&nbsp;α — in the direction the block is pushed horizontally. The component <strong>perpendicular</strong> to the surface is F&nbsp;sin&nbsp;α — since the force is directed <em>below</em> the horizontal, does this component push towards or away from the surface?',
    oc:    { x: 250, y: 230 },
    dz:    62,
    palette: ['F cos α', 'F sin α'],
    dirs: [
      { label: 'Parallel to surface — to the right',                      a:   0 },
      { label: 'Parallel to surface — to the left',                       a: 180 },
      { label: 'Perpendicular to surface — upward (away from surface)',    a: 270 },
      { label: 'Perpendicular to surface — downward (into surface)',       a:  90 },
    ],
    answer: [
      { force: 'F cos α', dir: 'Parallel to surface — to the right'                },
      { force: 'F sin α', dir: 'Perpendicular to surface — downward (into surface)' },
    ],
    expl: 'Since <strong>F</strong> acts at angle α <em>below</em> the horizontal: the component <strong>parallel</strong> to the surface is <strong>F&thinsp;cos&thinsp;α</strong>, acting to the right. The component <strong>perpendicular</strong> to the surface is <strong>F&thinsp;sin&thinsp;α</strong>, acting <em>downward</em> — into the surface. This increases the normal reaction: N = mg + F sin α.',
    drawSVG: drawResolvedForceBelow,
  },

  connected: {
    title: 'Two Masses Suspended on a String',
    desc:  'Mass <strong>m₁</strong> hangs from a ceiling by a light inextensible string. Mass <strong>m₂</strong> is supported directly below m₁ by a second light string. The system is in <strong>equilibrium</strong>. Draw <em>all</em> forces acting on <strong>each</strong> mass — drag arrows onto <em>m₁</em> and <em>m₂</em> separately.',
    hint:  '<strong>m₁</strong> has three forces: its own weight downward, the ceiling tension T₁ upward, and the lower string tension T₂ pulling it downward. <strong>m₂</strong> has two forces: its own weight downward and T₂ upward.',
    expl:  'On <strong>m₁</strong>: Weight (= m₁g) acts down; <strong>T₁</strong> acts up (ceiling string); <strong>T₂</strong> acts down (the lower string pulls m₁ toward m₂). On <strong>m₂</strong>: Weight (= m₂g) acts down; <strong>T₂</strong> acts up. In equilibrium: T₁ = (m₁ + m₂)g and T₂ = m₂g.',
    palette: ['Weight', 'T₁', 'T₂'],
    diagramNote: 'The weight forces should act through the centre of the objects but have been moved slightly to the left of the centre of the masses to avoid arrow overlap and make the diagram clearer.',
    bodies: [
      {
        id:    'm1',
        label: 'm₁',
        oc:    { x: 250, y: 189 },
        dz:    48,
        forceXOffset:    { 'Weight': -15 },
        forceYOffset:    { 'T₁': -28, 'T₂': 28 },
        forceLabelOverride: {
          'Weight': { lx: -10, ly: 0, anchor: 'end'   },
          'T₁':    { lx:  10, ly: 0, anchor: 'start' },
          'T₂':    { lx:  10, ly: 0, anchor: 'start' },
        },
        forceArrowLen:   { 'T₁': 37, 'T₂': 34 },
        dirs: [
          { label: 'Vertically downward', a:  90 },
          { label: 'Vertically upward',   a: 270 },
        ],
        answer: [
          { force: 'Weight', dir: 'Vertically downward' },
          { force: 'T₁',    dir: 'Vertically upward'   },
          { force: 'T₂',    dir: 'Vertically downward' },
        ],
      },
      {
        id:    'm2',
        label: 'm₂',
        oc:    { x: 250, y: 359 },
        dz:    48,
        forceXOffset:    { 'Weight': -15 },
        forceYOffset:    { 'T₂': -28 },
        forceLabelOverride: {
          'Weight': { lx: -10, ly: 0, anchor: 'end'   },
          'T₂':    { lx:  10, ly: 0, anchor: 'start' },
        },
        forceArrowLen:   { 'T₂': 34 },
        dirs: [
          { label: 'Vertically downward', a:  90 },
          { label: 'Vertically upward',   a: 270 },
        ],
        answer: [
          { force: 'Weight', dir: 'Vertically downward' },
          { force: 'T₂',    dir: 'Vertically upward'   },
        ],
      },
    ],
    drawSVG: drawConnectedMasses,
    viewH:   490,
  },

};

// ══════════════════════════════════════════════════════════
//  SVG DIAGRAM DRAWING FUNCTIONS
//  Each returns an SVG string for the static diagram layer.
//  Slope geometry for inclined plane:
//    base (70, 330) → tip (430, 123)   run=360, rise=207 → angle=30.0°
// ══════════════════════════════════════════════════════════

function drawInclinedPlane(s) {

function drawResolvedForce(s) {
  const { x: cx, y: cy } = s.oc;
  // Force F shown at 30° above horizontal (illustrated; labelled α throughout).
  // Geometry (all relative to block centre cx, cy):
  //   F tip     : cx + 90·cos 30° ≈ cx+78,  cy − 90·sin 30° = cy−45
  //   arc start : cx+80, cy          (on horizontal reference, outside block edge cx+66)
  //   arc end   : cx + 80·cos 30° ≈ cx+69,  cy − 80·sin 30° = cy−40
  // Arc: M (cx+80,cy) A 80,80 0 0,0 (cx+69,cy−40)  — small CCW arc (30°)
  const ftx = Math.round(cx + 78);   // F arrow tip x
  const fty = Math.round(cy - 45);   // F arrow tip y
  const aex = Math.round(cx + 69);   // arc end x
  const aey = Math.round(cy - 40);   // arc end y

  return `
    <!-- ground hatch and line -->
    <rect x="50" y="${cy + 48}" width="405" height="22" fill="url(#hatch)"/>
    <line x1="50" y1="${cy + 48}" x2="455" y2="${cy + 48}" stroke="#666" stroke-width="2"/>

    <!-- Force F: drawn first so block paints over the inner portion, leaving arrowhead visible -->
    <line x1="${cx}" y1="${cy}" x2="${ftx}" y2="${fty}"
          stroke="#c0392b" stroke-width="2.5" marker-end="url(#ah-red)"/>

    <!-- drop-zone ring -->
    <circle id="dzr" cx="${cx}" cy="${cy}" r="62"
            fill="rgba(36,113,163,0.1)" stroke="#2471a3" stroke-width="1.8"
            stroke-dasharray="6 3" opacity="0"
            style="transition:opacity 0.18s;pointer-events:none"/>

    <!-- block (painted after F line, so it hides the inner segment of F) -->
    <rect x="${cx - 66}" y="${cy - 44}" width="132" height="88"
          fill="#4a86b8" stroke="#2471a3" stroke-width="2" rx="5"/>
    <text x="${cx}" y="${cy + 2}"
          text-anchor="middle" dominant-baseline="middle"
          fill="white" font-size="16" font-weight="bold"
          font-family="Georgia,serif">m</text>

    <!-- horizontal dashed reference tick (right of block, painted over block edge) -->
    <line x1="${cx + 66}" y1="${cy}" x2="${cx + 92}" y2="${cy}"
          stroke="#888" stroke-width="1.5" stroke-dasharray="5 3"/>

    <!-- angle arc α: radius 80, from horizontal reference to F direction -->
    <!-- M (cx+80, cy) A 80,80 0 0,0 (cx+69, cy−40)  — 30° CCW in screen coords = upward -->
    <path d="M ${cx + 80},${cy} A 80,80 0 0,0 ${aex},${aey}"
          fill="none" stroke="#555" stroke-width="1.6"/>

    <!-- α label at ~−15° (midpoint of arc), radius 90 -->
    <text x="${cx + 89}" y="${cy - 21}"
          font-size="14" fill="#444" font-style="italic"
          font-family="Georgia,serif">α</text>

    <!-- F label just beyond arrowhead -->
    <text x="${ftx + 5}" y="${fty - 6}"
          fill="#c0392b" font-size="15" font-weight="bold" font-style="italic"
          font-family="Georgia,serif">F</text>
  `;
}

function drawResolvedForceBelow(s) {
  const { x: cx, y: cy } = s.oc;

  // cy = 230 (set in scenario oc) so the downward-angled arrow stays

  const ftx = Math.round(cx + 78);   // F tip x

  const aex = Math.round(cx + 69);   // arc end x

  return `

            fill="rgba(36,113,163,0.1)" stroke="#2471a3" stroke-width="1.8"

            style="transition:opacity 0.18s;pointer-events:none"/>

    <!-- block (painted after F so block hides the arrow's inner portion) -->
    <rect x="${cx - 66}" y="${cy - 44}" width="132" height="88"
          fill="#4a86b8" stroke="#2471a3" stroke-width="2" rx="5"/>
    <text x="${cx}" y="${cy + 2}"
          text-anchor="middle" dominant-baseline="middle"

    <line x1="${cx + 66}" y1="${cy}" x2="${cx + 92}" y2="${cy}"

    <!-- angle arc α: radius 80, CLOCKWISE from horizontal down to F direction -->
    <path d="M ${cx + 80},${cy} A 80,80 0 0,1 ${aex},${aey}"

function drawConnectedMasses(s) {
  // Layout (500×400 SVG):
  //   Ceiling:  y=25–40
  //   T₁ string: (250,40) → (250,120)
  //   m₁ box:   centre (250,148), half-w=38, half-h=28  → y=120–176
  //   T₂ string: (250,176) → (250,252)
  //   m₂ box:   centre (250,280), half-w=38, half-h=28  → y=252–308
  const [b0, b1] = s.bodies;   // m₁, m₂
  const c1x = b0.oc.x, c1y = b0.oc.y;   // 250, 148
  const c2x = b1.oc.x, c2y = b1.oc.y;   // 250, 280
  const hw = 38, hh = 28;                // half-width, half-height of each box

  return `
    <!-- ceiling hatch and underside line -->
    <rect x="90" y="15" width="320" height="22" fill="url(#hatch)"/>
    <line x1="90" y1="37" x2="410" y2="37" stroke="#666" stroke-width="2"/>

    <!-- T₁ string: ceiling to top of m₁ -->
    <line x1="${c1x}" y1="37" x2="${c1x}" y2="${c1y - hh}"
          stroke="#555" stroke-width="2"/>

    <!-- T₂ string: bottom of m₁ to top of m₂ -->
    <line x1="${c2x}" y1="${c1y + hh}" x2="${c2x}" y2="${c2y - hh}"
          stroke="#555" stroke-width="2"/>

    <!-- T₁ label beside upper string -->
    <text x="${c1x + 30}" y="${Math.round((37 + c1y - hh) / 2)}"
          fill="#d35400" font-size="14" font-weight="bold" font-style="italic"
          font-family="Georgia,serif">T₁</text>

    <!-- T₂ label beside lower string -->
    <text x="${c2x + 30}" y="${Math.round((c1y + hh + c2y - hh) / 2)}"
          fill="#2980b9" font-size="14" font-weight="bold" font-style="italic"
          font-family="Georgia,serif">T₂</text>

    <!-- drop-zone ring for m₁ -->
    <circle id="dzr0" cx="${c1x}" cy="${c1y}" r="${b0.dz}"
            fill="rgba(36,113,163,0.1)" stroke="#2471a3" stroke-width="1.8"
            stroke-dasharray="6 3" opacity="0"
            style="transition:opacity 0.18s;pointer-events:none"/>

    <!-- drop-zone ring for m₂ -->
    <circle id="dzr1" cx="${c2x}" cy="${c2y}" r="${b1.dz}"
            fill="rgba(36,113,163,0.1)" stroke="#2471a3" stroke-width="1.8"
            stroke-dasharray="6 3" opacity="0"
            style="transition:opacity 0.18s;pointer-events:none"/>

    <!-- m₁ box -->
    <rect x="${c1x - hw}" y="${c1y - hh}" width="${hw * 2}" height="${hh * 2}"
          fill="#4a86b8" stroke="#2471a3" stroke-width="2" rx="4"/>
    <text x="${c1x}" y="${c1y + 1}"
          text-anchor="middle" dominant-baseline="middle"
          fill="white" font-size="15" font-weight="bold"
          font-family="Georgia,serif">m₁</text>

    <!-- m₂ box -->
    <rect x="${c2x - hw}" y="${c2y - hh}" width="${hw * 2}" height="${hh * 2}"
          fill="#4a86b8" stroke="#2471a3" stroke-width="2" rx="4"/>
    <text x="${c2x}" y="${c2y + 1}"
          text-anchor="middle" dominant-baseline="middle"
          fill="white" font-size="15" font-weight="bold"
          font-family="Georgia,serif">m₂</text>
  `;
}

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let curKey   = 'inclined';
let placed   = [];     // [ { force, dir, angle } ]
let dragData = null;   // { force } while dragging
let hinting  = false;

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
function init() {
  buildPalette();
  loadScenario('inclined');

  document.getElementById('sel').addEventListener('change', e => {
    loadScenario(e.target.value);
  });
  document.getElementById('btn-check').addEventListener('click', checkAnswer);
  document.getElementById('btn-reset').addEventListener('click', reset);
  document.getElementById('btn-hint').addEventListener('click', toggleHint);
  document.getElementById('picker-close').addEventListener('click', closePicker);

  // Arrow removal via event delegation
  document.getElementById('arrows-layer').addEventListener('click', e => {
    const g = e.target.closest('[data-idx]');
    if (!g) return;
    placed.splice(parseInt(g.dataset.idx), 1);
    renderArrows();
    refreshPalette();
    clearFeedback();
  });

  // Global mouse handlers for drag
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
}

// ══════════════════════════════════════════════════════════
//  PALETTE
// ══════════════════════════════════════════════════════════
function buildPalette() {
  const s = SCENARIOS[curKey];
  const forcesToShow = s.palette || ALL_FORCES;
  const cont = document.getElementById('palette-forces');
  cont.innerHTML = '';
  forcesToShow.forEach(f => {
    const col = COLORS[f];
    const fid = 'ca-' + f.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_-]/g, 'x');
    const chip = document.createElement('div');
    chip.className = 'force-chip';
    chip.dataset.force = f;
    chip.style.borderColor = col;
    chip.innerHTML = `
      <svg width="28" height="14" viewBox="0 0 28 14" style="flex-shrink:0">
        <defs>
          <marker id="${fid}" markerWidth="7" markerHeight="5"
                  refX="6.5" refY="2.5" orient="auto">
            <polygon points="0 0,7 2.5,0 5" fill="${col}"/>
          </marker>
        </defs>
        <line x1="2" y1="7" x2="20" y2="7" stroke="${col}" stroke-width="2.5"
              marker-end="url(#${fid})"/>
      </svg>
      <span class="chip-name" style="color:${col}">${f}</span>`;
    chip.addEventListener('mousedown',  e => startDrag(e, f));
    chip.addEventListener('touchstart', e => startDragTouch(e, f), { passive: false });
    cont.appendChild(chip);
  });
}

// Returns true when the chip should be greyed-out (all required placements done).
function isForceFullyUsed(force) {
  const s = SCENARIOS[curKey];
  const timesPlaced = placed.filter(p => p.force === force).length;
  if (s.bodies) {
    const timesNeeded = s.bodies.reduce((n, b) =>
      n + b.answer.filter(a => a.force === force).length, 0);
    return timesPlaced >= timesNeeded;
  }
  return timesPlaced >= 1;
}

function refreshPalette() {
  document.querySelectorAll('.force-chip').forEach(el => {
    el.classList.toggle('used', isForceFullyUsed(el.dataset.force));
  });
}

// ══════════════════════════════════════════════════════════
//  SCENARIO LOADING
// ══════════════════════════════════════════════════════════
function loadScenario(key) {
  curKey  = key;
  placed  = [];
  hinting = false;

  const s = SCENARIOS[key];
  document.getElementById('desc').innerHTML =
    `<span class="stitle">${s.title}</span>${s.desc}`;
  // Update SVG viewport height per scenario (default 400)
  document.getElementById('diagram-svg')
    .setAttribute('viewBox', `0 0 ${VW} ${s.viewH || VH}`);
  const noteEl = document.getElementById('diagram-note');
  if (s.diagramNote) {
    noteEl.textContent = s.diagramNote;
    noteEl.style.display = 'block';
  } else {
    noteEl.textContent = '';
    noteEl.style.display = 'none';
  }
  document.getElementById('static-layer').innerHTML = s.drawSVG(s);
  document.getElementById('arrows-layer').innerHTML = '';
  clearFeedback();
  closePicker();
  buildPalette();
  refreshPalette();
}

// ══════════════════════════════════════════════════════════
//  DRAG — MOUSE
// ══════════════════════════════════════════════════════════
function startDrag(e, force) {
  e.preventDefault();
  if (isForceFullyUsed(force)) return;
  dragData = { force };
  const g = document.getElementById('ghost');
  g.textContent = force;
  g.style.background = COLORS[force];
  g.classList.add('active');
  moveGhost(e.clientX, e.clientY);
  setDropZoneVisible(true);
}

function onMouseMove(e) {
  if (!dragData) return;
  moveGhost(e.clientX, e.clientY);
}

function onMouseUp(e) {
  if (!dragData) return;
  endDrag(e.clientX, e.clientY);
}

function moveGhost(cx, cy) {
  const g = document.getElementById('ghost');
  g.style.left = cx + 'px';
  g.style.top  = cy + 'px';
}

function endDrag(cx, cy) {
  document.getElementById('ghost').classList.remove('active');
  setDropZoneVisible(false);
  const force = dragData.force;
  dragData = null;
  const hit = getBodyForCoords(cx, cy);
  if (hit) showPicker(cx, cy, force, hit.body, hit.idx);
}

// ══════════════════════════════════════════════════════════
//  DRAG — TOUCH
// ══════════════════════════════════════════════════════════
function startDragTouch(e, force) {
  e.preventDefault();
  if (isForceFullyUsed(force)) return;
  dragData = { force };
  const t = e.touches[0];
  const g = document.getElementById('ghost');
  g.textContent = force;
  g.style.background = COLORS[force];
  g.classList.add('active');
  moveGhost(t.clientX, t.clientY);
  setDropZoneVisible(true);

  const el = e.currentTarget;
  function onTM(ev) {
    ev.preventDefault();
    const tt = ev.touches[0];
    moveGhost(tt.clientX, tt.clientY);
  }
  function onTE(ev) {
    document.getElementById('ghost').classList.remove('active');
    setDropZoneVisible(false);
    const tt = ev.changedTouches[0];
    const force2 = dragData ? dragData.force : null;
    dragData = null;
    if (force2) {
      const hit = getBodyForCoords(tt.clientX, tt.clientY);
      if (hit) showPicker(tt.clientX, tt.clientY, force2, hit.body, hit.idx);
    }
    el.removeEventListener('touchmove',   onTM);
    el.removeEventListener('touchend',    onTE);
    el.removeEventListener('touchcancel', onTE);
  }
  el.addEventListener('touchmove',   onTM, { passive: false });
  el.addEventListener('touchend',    onTE);
  el.addEventListener('touchcancel', onTE);
}

// ══════════════════════════════════════════════════════════
//  DROP ZONE
// ══════════════════════════════════════════════════════════
function setDropZoneVisible(show) {
  // matches id="dzr" (single-body) and id="dzr0", "dzr1" … (multi-body)
  document.querySelectorAll('[id^="dzr"]').forEach(el => {
    el.style.opacity = show ? '1' : '0';
  });
}

// Returns { body, idx } for the body the pointer is over, or null.
// For single-body scenarios body === the scenario object, idx === -1.
function getBodyForCoords(clientX, clientY) {
  const svg  = document.getElementById('diagram-svg');
  const rect = svg.getBoundingClientRect();
  const svgH = svg.viewBox.baseVal.height;   // live value — changes per scenario
  const sx   = (clientX - rect.left) * (VW  / rect.width);
  const sy   = (clientY - rect.top)  * (svgH / rect.height);
  const s    = SCENARIOS[curKey];

  if (s.bodies) {
    for (let i = 0; i < s.bodies.length; i++) {
      const b = s.bodies[i];
      if (Math.hypot(sx - b.oc.x, sy - b.oc.y) <= b.dz) return { body: b, idx: i };
    }
    return null;
  }
  // Single-body
  if (Math.hypot(sx - s.oc.x, sy - s.oc.y) <= s.dz) return { body: s, idx: -1 };
  return null;
}

// ══════════════════════════════════════════════════════════
//  DIRECTION PICKER
// ══════════════════════════════════════════════════════════
function showPicker(clientX, clientY, force, body, bodyIdx) {
  const nameEl = document.getElementById('picker-force-name');
  nameEl.textContent = force;
  nameEl.style.color = COLORS[force];

  // Sub-heading: show which body is being assigned when multi-body
  const subEl = document.getElementById('picker-sub');
  subEl.textContent = (bodyIdx >= 0 && body.label)
    ? `Direction of this force on ${body.label}:`
    : 'Choose the direction of this force:';

  const dirsEl = document.getElementById('picker-dirs');
  dirsEl.innerHTML = '';
  body.dirs.forEach(d => {
    const btn = document.createElement('button');
    btn.className   = 'dir-btn';
    btn.textContent = d.label;
    btn.addEventListener('click', () => placeForce(force, d.label, d.a, bodyIdx));
    dirsEl.appendChild(btn);
  });

  const picker = document.getElementById('picker');
  picker.classList.add('open');

  const pw = picker.offsetWidth  || 245;
  const ph = picker.offsetHeight || 230;
  let lx = clientX + 18;
  let ly = clientY - 14;
  if (lx + pw > window.innerWidth  - 8) lx = clientX - pw - 18;
  if (ly + ph > window.innerHeight - 8) ly = window.innerHeight - ph - 8;
  if (ly < 6) ly = 6;
  picker.style.left = lx + 'px';
  picker.style.top  = ly + 'px';
}

function closePicker() {
  document.getElementById('picker').classList.remove('open');
}

// ══════════════════════════════════════════════════════════
//  PLACE / REMOVE FORCES
// ══════════════════════════════════════════════════════════
function placeForce(force, dir, angle, bodyIdx) {
  closePicker();
  placed.push({ force, dir, angle, bodyIdx });
  renderArrows();
  refreshPalette();
  clearFeedback();
}

// ══════════════════════════════════════════════════════════
//  RENDER ARROWS
// ══════════════════════════════════════════════════════════
function renderArrows() {
  const s     = SCENARIOS[curKey];
  const layer = document.getElementById('arrows-layer');

  layer.innerHTML = placed.map((p, i) => {
    // Determine origin: multi-body uses the body's oc; single-body uses scenario oc
    let ox, oy;
    if (p.bodyIdx >= 0 && s.bodies) {
      const b = s.bodies[p.bodyIdx];
      const xOff = (b.forceXOffset && b.forceXOffset[p.force]) || 0;
      const yOff = (b.forceYOffset && b.forceYOffset[p.force]) || 0;
      ox = b.oc.x + xOff; oy = b.oc.y + yOff;
    } else {
      ox = s.oc.x; oy = s.oc.y;
    }

    const rad = p.angle * Math.PI / 180;
    // Per-force arrow length override (forceArrowLen on the body), else global AL
    const arrLen = (p.bodyIdx >= 0 && s.bodies && s.bodies[p.bodyIdx].forceArrowLen)
      ? (s.bodies[p.bodyIdx].forceArrowLen[p.force] ?? AL)
      : AL;
    const ex  = ox + arrLen * Math.cos(rad);
    const ey  = oy + arrLen * Math.sin(rad);
    const col = COLORS[p.force] || '#555';

    // Label position: use forceLabelOverride (offset from arrowhead) if defined,
    // otherwise fall back to 20px beyond the arrowhead along the arrow direction.
    let lx, ly, anchor, base;
    const labelOvr = (p.bodyIdx >= 0 && s.bodies)
      ? (s.bodies[p.bodyIdx].forceLabelOverride || {})[p.force]
      : undefined;

    if (labelOvr) {
      lx     = ex + labelOvr.lx;
      ly     = ey + labelOvr.ly;
      anchor = labelOvr.anchor ?? 'end';
      base   = 'middle';
    } else {
      lx = ox + (arrLen + 20) * Math.cos(rad);
      ly = oy + (arrLen + 20) * Math.sin(rad);
      const cosA = Math.cos(rad), sinA = Math.sin(rad);
      anchor = cosA >  0.2 ? 'start' : cosA < -0.2 ? 'end' : 'middle';
      base   = sinA >  0.2 ? 'hanging'
             : sinA < -0.2 ? 'auto'
             : 'middle';
    }

    return `<g class="placed-g" data-idx="${i}">
      <title>Click to remove: ${p.force}</title>
      <line class="arrow-line"
            x1="${ox}" y1="${oy}" x2="${ex}" y2="${ey}"
            stroke="${col}" stroke-width="2.6"
            marker-end="url(#ah)"/>
      <text x="${lx}" y="${ly}"
            fill="${col}" font-size="11" font-weight="bold"
            font-family="Georgia,serif"
            text-anchor="${anchor}" dominant-baseline="${base}">${p.force}</text>
      <line class="hit-area"
            x1="${ox}" y1="${oy}" x2="${ex}" y2="${ey}"/>
    </g>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
//  CHECK ANSWER
// ══════════════════════════════════════════════════════════
function checkAnswer() {
  hinting = false;
  const s = SCENARIOS[curKey];

  if (placed.length === 0) {
    showFeedback('error',
      '<p>No forces have been placed yet. Drag force arrows onto the object first.</p>');
    return;
  }

  // ── Multi-body scenario ──────────────────────────────────
  if (s.bodies) {
    let allOk = true;
    const lines = [];

    s.bodies.forEach((b, idx) => {
      const bodyPlaced = placed.filter(p => p.bodyIdx === idx);
      lines.push(`<p style="margin-top:7px"><strong>Forces on ${b.label}:</strong></p>`);

      for (const ans of b.answer) {
        const p = bodyPlaced.find(x => x.force === ans.force);
        if (!p) {
          lines.push(`<div class="fb-miss">⚠ <strong>${ans.force}</strong> is missing.</div>`);
          allOk = false;
        } else if (p.dir !== ans.dir) {
          lines.push(`<div class="fb-bad">✗ <strong>${ans.force}</strong>: wrong direction.`
                   + ` <em>(Correct: ${ans.dir})</em></div>`);
          allOk = false;
        } else {
          lines.push(`<div class="fb-ok">✓ <strong>${ans.force}</strong>: correct.</div>`);
        }
      }
      // Extra forces placed on this body that aren't needed
      for (const p of bodyPlaced) {
        if (!b.answer.find(a => a.force === p.force)) {
          lines.push(`<div class="fb-bad">✗ <strong>${p.force}</strong>`
                   + ` is not needed on ${b.label}.</div>`);
          allOk = false;
        }
      }
    });

    const head = allOk
      ? '<p><strong>🎉 Excellent — all forces correctly placed on both masses!</strong></p>'
      : '<p><strong>Not quite right. See details below:</strong></p>';
    const expl = allOk ? `<span class="fb-expl">${s.expl}</span>` : '';
    showFeedback(allOk ? 'success' : 'error', head + lines.join('') + expl);
    return;
  }

  // ── Single-body scenario (original logic) ───────────────
  let allOk = true;
  const lines = [];

  for (const ans of s.answer) {
    const p = placed.find(x => x.force === ans.force);
    if (!p) {
      lines.push(`<div class="fb-miss">⚠ <strong>${ans.force}</strong> is missing from your diagram.</div>`);
      allOk = false;
    } else if (p.dir !== ans.dir) {
      lines.push(`<div class="fb-bad">✗ <strong>${ans.force}</strong>: wrong direction.`
               + ` <em>(Correct: ${ans.dir})</em></div>`);
      allOk = false;
    } else {
      lines.push(`<div class="fb-ok">✓ <strong>${ans.force}</strong>: correct.</div>`);
    }
  }

  for (const p of placed) {
    if (!s.answer.find(a => a.force === p.force)) {
      lines.push(`<div class="fb-bad">✗ <strong>${p.force}</strong>`
               + ` is not needed in this scenario.</div>`);
      allOk = false;
    }
  }

  const head = allOk
    ? '<p><strong>🎉 Excellent — all forces correctly placed!</strong></p>'
    : '<p><strong>Not quite right. See details below:</strong></p>';
  const expl = allOk ? `<span class="fb-expl">${s.expl}</span>` : '';
  showFeedback(allOk ? 'success' : 'error', head + lines.join('') + expl);
}

// ══════════════════════════════════════════════════════════
//  RESET / HINT
// ══════════════════════════════════════════════════════════
function reset() {
  placed = [];
  hinting = false;
  renderArrows();
  refreshPalette();
  clearFeedback();
  closePicker();
}

function toggleHint() {
  if (hinting) {
    clearFeedback();
    hinting = false;
  } else {
    showFeedback('info',
      `<p>💡 <strong>Hint:</strong> ${SCENARIOS[curKey].hint}</p>`);
    hinting = true;
  }
}

// ══════════════════════════════════════════════════════════
//  FEEDBACK HELPERS
// ══════════════════════════════════════════════════════════
function showFeedback(type, html) {
  const el = document.getElementById('feedback');
  el.className = type;
  el.innerHTML = html;
}
function clearFeedback() {
  const el = document.getElementById('feedback');
  el.className = '';
  el.innerHTML = '';
}

// ══════════════════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
